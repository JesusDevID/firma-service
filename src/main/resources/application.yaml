spring:
  application:
    name: firma-service

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:h2:file:./data/firmadb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:equidad-firma-service-jwt-secret-key-2026-super-segura-y-mas-larga}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:86400000}

signio:
  url: ${SIGNIO_URL:https://api.signio.com}
  token: ${SIGNIO_TOKEN:TOKEN_PRUEBA_123}
  webhook-secret: ${SIGNIO_WEBHOOK_SECRET:}
  webhook-url: ${SIGNIO_WEBHOOK_URL:http://localhost:8080/webhooks/signio}

onbase:
  url: ${ONBASE_URL:}
  token: ${ONBASE_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: firma-service
    description: Microservicio de gestión de firmas preparado para Signio y OnBase
    version: 0.0.1-SNAPSHOT
