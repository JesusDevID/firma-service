services:
  firma-service:
    build: .
    container_name: firma-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET:-equidad-firma-service-jwt-secret-docker-2026-super-segura}
      JWT_EXPIRATION_MILLIS: ${JWT_EXPIRATION_MILLIS:-86400000}
      SIGNIO_URL: ${SIGNIO_URL:-https://signio.mock.local}
      SIGNIO_TOKEN: ${SIGNIO_TOKEN:-TOKEN_PRUEBA_123}

  postgres:
    image: postgres:16-alpine
    container_name: firma-postgres
    profiles:
      - postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-firma_db}
      POSTGRES_USER: ${POSTGRES_USER:-firma_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firma_password}
    volumes:
      - firma-postgres-data:/var/lib/postgresql/data

volumes:
  firma-postgres-data:
