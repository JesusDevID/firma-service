spring:
  datasource:
    url: ${QA_DATASOURCE_URL:jdbc:h2:file:./data/firmadb-qa}
    driver-class-name: ${QA_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${QA_DATASOURCE_USER:sa}
    password: ${QA_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:86400000}

signio:
  url: ${SIGNIO_URL}
  token: ${SIGNIO_TOKEN}
  webhook-secret: ${SIGNIO_WEBHOOK_SECRET}
  webhook-url: ${SIGNIO_WEBHOOK_URL}

onbase:
  url: ${ONBASE_URL:}
  token: ${ONBASE_TOKEN:}

integrations:
  signio:
    mode: ${SIGNIO_INTEGRATION_MODE:mock}
  onbase:
    enabled: ${ONBASE_ENABLED:false}
